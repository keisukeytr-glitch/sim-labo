<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIM比較ラボ | 格安SIM・キャリアの徹底比較</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="update-badge" id="currentDateBadge">2026年3月最新版</div>
            <h1>SIM比較ラボ</h1>
            <p class="hero-subline">後悔しない格安SIM選びを、最短30秒で。</p>
            <p class="hero-desc">20社以上のプランを徹底比較。あなたに「ちょうどいい」1枚を厳選紹介。</p>
        </div>
    </header>

    <div class="container">
        <!-- Quick Guide -->
        <section class="guide-section">
            <h3 style="text-align: center; color: var(--primary);">失敗しないSIM選び 3つのステップ</h3>
            <div class="guide-grid">
                <div class="guide-step">
                    <span class="step-num">1</span>
                    <p style="font-size: 0.9rem; font-weight: 700;">今のギガ数を確認</p>
                    <p style="font-size: 0.8rem; color: var(--text-muted);">設定アプリから月々の使用量を見てみよう</p>
                </div>
                <div class="guide-step">
                    <span class="step-num">2</span>
                    <p style="font-size: 0.9rem; font-weight: 700;">通話が必要か判断</p>
                    <p style="font-size: 0.8rem; color: var(--text-muted);">LINE通話メインなら、カケホは不要かも</p>
                </div>
                <div class="guide-step">
                    <span class="step-num">3</span>
                    <p style="font-size: 0.9rem; font-weight: 700;">セット割をチェック</p>
                    <p style="font-size: 0.8rem; color: var(--text-muted);">お家のネットと合わせるとさらに安くなる！</p>
                </div>
            </div>
        </section>

        <!-- Category Navigation -->
        <nav class="cat-nav">
            <button class="cat-btn active" data-cat="all">すべて</button>
            <button class="cat-btn" data-cat="balance">バランス重視</button>
            <button class="cat-btn" data-cat="cheap">安さ重視</button>
            <button class="cat-btn" data-cat="unlimited">データ無制限</button>
        </nav>

        <section id="rankingContainer" class="ranking-section">
            <div class="skeleton-card skeleton"></div>
            <div class="skeleton-card skeleton"></div>
            <div class="skeleton-card skeleton"></div>
        </section>

        <footer style="margin-top: 80px; text-align: center; color: var(--text-muted); padding: 40px 0;">
            <p>&copy; 2026 SIM比較ラボ (SIM Review Lab). All rights reserved.</p>
        </footer>
    </div>

    <script src="main.js"></script>
</body>
</html>
