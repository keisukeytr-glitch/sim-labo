<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>特別プランのご案内 | SIM比較ラボ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .hero-lp {
            padding: 100px 20px;
            text-align: center;
            background: white;
            border-radius: 40px;
            margin-bottom: 40px;
            box-shadow: var(--card-shadow);
        }
        .plan-highlight {
            font-size: 4rem;
            font-weight: 800;
            color: var(--primary);
            margin: 20px 0;
        }
        .cta-section {
            max-width: 500px;
            margin: 40px auto;
        }
        .benefit-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 40px 0;
        }
        .benefit-item {
            padding: 20px;
            background: #f8fafc;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>SIM比較ラボ</h1>
            <p style="color: var(--text-muted); font-weight: 500;">あなたに最適な回線を「タイプ別」に見つける徹底比較メディア</p>
        </div>
    </header>

    <div class="container">
        <h2 id="lpTitle" style="text-align: center; color: var(--primary); margin: 20px 0; font-weight: 800;">SPECIAL OFFER</h2>

        <section class="hero-lp">
            <div id="lpCarrier" class="carrier-badge">---</div>
            <h2 id="lpPlanName" style="font-size: 2.5rem; margin: 20px 0;">---</h2>
            <div id="lpPrice" class="plan-highlight">¥0</div>
            <p id="lpCapacity" style="font-size: 1.5rem; font-weight: 600; color: var(--text-muted);">データ容量: ---</p>
            
            <div class="benefit-grid">
                <div class="benefit-item"><strong>高速通信</strong><br>快適な5G対応</div>
                <div class="benefit-item"><strong>縛りなし</strong><br>解約金0円</div>
                <div class="benefit-item"><strong>即日切替</strong><br>eSIM対応</div>
            </div>

            <div class="cta-section">
                <a id="lpLink" href="#" class="btn-cta" style="font-size: 1.2rem; padding: 20px;">今すぐ公式サイトで申し込む</a>
            </div>
        </section>

        <footer style="text-align: center; color: var(--text-muted); padding: 40px 0;">
            <p>&copy; 2026 SIM比較ラボ (SIM Review Lab). All rights reserved.</p>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const planId = params.get('plan');

            if (!planId) {
                document.body.innerHTML = '<div class="container"><h1 style="text-align:center; padding-top:100px;">プランが指定されていません。</h1></div>';
                return;
            }

            try {
                const response = await fetch('plans.json');
                const plans = await response.json();
                const plan = plans.find(p => p.id === planId);

                if (plan) {
                    document.title = `${plan.name} 特別招待ページ | SIM比較ラボ`;
                    const updateText = (id, text) => {
                        const el = document.getElementById(id);
                        if (el) el.innerText = text;
                    };
                    updateText('lpTitle', 'SPECIAL OFFER');
                    updateText('lpCarrier', plan.carrier);
                    updateText('lpPlanName', plan.name);
                    updateText('lpPrice', `¥${plan.price.toLocaleString()}`);
                    updateText('lpCapacity', `データ容量: ${plan.capacity}`);
                    
                    const lpLink = document.getElementById('lpLink');
                    if (lpLink) lpLink.href = plan.url;
                } else {
                    document.body.innerHTML = '<h1>プランが見つかりませんでした。</h1>';
                }
            } catch (e) {
                console.error(e);
            }
        });
    </script>
</body>
</html>
